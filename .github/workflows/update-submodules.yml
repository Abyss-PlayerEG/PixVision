name: Auto Update Submodules

on:
  repository_dispatch:
    types: [update-submodule]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-submodules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: true

      - name: Update specific submodule
        if: github.event_name == 'repository_dispatch'
        run: |
          REPO_NAME="${{ github.event.client_payload.repo }}"
          echo "Updating submodule: $REPO_NAME"
          git submodule update --remote --merge "$REPO_NAME"

      - name: Update all submodules
        if: github.event_name != 'repository_dispatch'
        run: git submodule update --remote --merge

      - name: Check for changes
        id: check
        run: |
          git diff --quiet || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "auto: 同步子模块 ${{ github.event.client_payload.repo || '全部' }} 到最新提交"
          git push
